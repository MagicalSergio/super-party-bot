name: party-dev

services:
  app:
    build: .
    image: party-bot-test
    container_name: party-bot-server-test
    env_file:
      - .env
    volumes:
      - "./src:/app/src"
      - "./data:/app/data"
      - "./index.ts:/app/index.ts"
    ports:
      - "8080:3000"
    command: ["/entrypoint.dev.sh"]
